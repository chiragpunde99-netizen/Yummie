<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Yummie</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #ff5a00, #f88547);
        }

        .login-container {
            width: 900px;
            height: 550px;
            background: white;
            border-radius: 20px;
            display: flex;
            overflow: hidden;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.2);
            animation: fadeIn 1s ease;
        }

        /* Left Side */
        .login-left {
            width: 50%;
            background: url("bg.jpeg") no-repeat center center/cover;
            position: relative;
        }

        .login-left::after {
            content: "";
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
        }

        .left-text {
            position: absolute;
            color: white;
            z-index: 2;
            padding: 40px;
            bottom: 50px;
        }

        .left-text h2 {
            font-size: 32px;
            font-weight: 700;
        }

        .left-text p {
            font-size: 14px;
            margin-top: 10px;
            opacity: 0.9;
        }

        /* Right Side */
        .login-right {
            width: 50%;
            padding: 60px 50px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .login-right h1 {
            font-size: 32px;
            margin-bottom: 10px;
        }

        .login-right p {
            font-size: 14px;
            margin-bottom: 30px;
        }

        .login-right a {
            color: #ff5a00;
            text-decoration: none;
            font-weight: 600;
        }

        .input-box {
            margin-bottom: 20px;
        }

        .input-box input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #ddd;
            outline: none;
            font-size: 14px;
            transition: 0.3s;
        }

        .input-box input:focus {
            border-color: #ff5a00;
        }

        .btn-login {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #ff5a00;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-login:hover {
            background: black;
        }

        .terms {
            font-size: 12px;
            margin-top: 15px;
            color: #555;
        }

        /* Animation */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .login-container {
                flex-direction: column;
                width: 95%;
                height: auto;
            }

            .login-left {
                display: none;
            }

            .login-right {
                width: 100%;
            }
        }
    </style>
</head>

<body>

    <div class="login-container">

        <!-- Left Side -->
        <div class="login-left">
            <div class="left-text">
                <h2>Welcome Back to Yummie 🍔</h2>
                <p>Healthy food delivered fresh at your doorstep.</p>
            </div>
        </div>

        <!-- Right Side -->
        <div class="login-right">
            <h1>Login</h1>
            <p>New to Yummie? <a href="sign in.html">Create an account</a></p>

            <div class="input-box">
                <input type="text" placeholder="Phone number or Email">
            </div>

            <div class="input-box">
                <input type="password" placeholder="Password">
            </div>

            <button class="btn-login">LOGIN</button>

            <div class="terms">
                By clicking on Login, I accept the Terms & Conditions & Privacy Policy
            </div>
        </div>

    </div>

</body>

</html>
