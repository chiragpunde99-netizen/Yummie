<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Yummie</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #ff5a00, #f88547);
        }

        .signup-container {
            width: 950px;
            height: 580px;
            background: white;
            border-radius: 20px;
            display: flex;
            overflow: hidden;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.2);
        }

        .signup-left {
            width: 50%;
            background: url("bg.jpeg") no-repeat center center/cover;
            position: relative;
        }

        .signup-left::after {
            content: "";
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
        }

        .left-text {
            position: absolute;
            color: white;
            z-index: 2;
            padding: 40px;
            bottom: 50px;
        }

        .left-text h2 {
            font-size: 30px;
            font-weight: 700;
        }

        .signup-right {
            width: 50%;
            padding: 50px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .signup-right h1 {
            font-size: 30px;
            margin-bottom: 10px;
        }

        .signup-right p {
            font-size: 14px;
            margin-bottom: 25px;
        }

        .signup-right a {
            color: #ff5a00;
            text-decoration: none;
            font-weight: 600;
        }

        .input-box {
            margin-bottom: 18px;
        }

        .input-box input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #ddd;
            outline: none;
            font-size: 14px;
        }

        .input-box input:focus {
            border-color: #ff5a00;
        }

        .btn-signup {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #ff5a00;
            color: white;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
        }

        .btn-signup:hover {
            background: black;
        }

        .terms {
            font-size: 12px;
            margin-top: 15px;
            color: #555;
        }

        @media (max-width: 768px) {
            .signup-container {
                flex-direction: column;
                width: 95%;
                height: auto;
            }

            .signup-left {
                display: none;
            }

            .signup-right {
                width: 100%;
            }
        }
    </style>
</head>

<body>

    <div class="signup-container">

        <div class="signup-left">
            <div class="left-text">
                <h2>Join Yummie Today 🍕</h2>
                <p>Create your account and start enjoying healthy meals.</p>
            </div>
        </div>

        <div class="signup-right">
            <h1>Create Account</h1>
            <p>Already have an account? <a href="login.html">Login</a></p>

            <div class="input-box">
                <input type="text" id="name" placeholder="Full Name">
            </div>

            <div class="input-box">
                <input type="email" id="email" placeholder="Email Address">
            </div>

            <div class="input-box">
                <input type="tel" id="phone" placeholder="Phone Number">
            </div>

            <div class="input-box">
                <input type="password" id="password" placeholder="Password">
            </div>

            <div class="input-box">
                <input type="password" id="confirmPassword" placeholder="Confirm Password">
            </div>

            <button class="btn-signup" onclick="signup()">SIGN UP</button>

            <div class="terms">
                By clicking on Sign Up, you agree to our Terms & Conditions & Privacy Policy
            </div>
        </div>

    </div>

<script>
function signup(){
    let name = document.getElementById("name").value;
    let email = document.getElementById("email").value;
    let phone = document.getElementById("phone").value;
    let password = document.getElementById("password").value;
    let confirmPassword = document.getElementById("confirmPassword").value;

    if(name === "" || email === "" || phone === "" || password === "" || confirmPassword === ""){
        alert("Please fill all fields!");
        return;
    }

    if(password !== confirmPassword){
        alert("Passwords do not match!");
        return;
    }

    // Save user data
    let userData = {
        name: name,
        email: email,
        phone: phone,
        password: password
    };

    localStorage.setItem("yummieAccount", JSON.stringify(userData));

    // Auto login
    localStorage.setItem("yummieUser", name);

    alert("Account created successfully!");
    window.location.href = "index.html";
}
</script>

</body>
</html>
