<!DOCTYPE html>

    <title>Restaurants</title>
    <style>
        body {
            font-family: Poppins, sans-serif;
            padding: 40px;
            background: #f2f2f2;
        }

        h1 {
            color: #ff5a00;
            margin-bottom: 40px;
            text-align: center;
        }

        /* ✅ 3 cards per row */
        .restaurant-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
            max-width: 1100px;
            margin: auto;
        }

        .restaurant-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            transition: 0.3s;
            cursor: pointer;
        }

        .restaurant-card:hover {
            transform: translateY(-8px);
        }

        .restaurant-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .restaurant-info {
            padding: 15px;
        }

        .restaurant-info h3 {
            margin: 0 0 8px;
        }

        .rating {
            color: green;
            font-weight: bold;
        }

        .details {
            font-size: 14px;
            color: gray;
        }
    </style>
</head>
