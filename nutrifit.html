<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#f3faf3;
}

/* NAVBAR */

.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 80px;
background:#2e7d32;
color:white;
}

.logo{
font-size:28px;
font-weight:800;
}

.nav-links{
display:flex;
gap:25px;
align-items:center;
}

.nav-links a{
color:white;
text-decoration:none;
font-weight:500;
}

.cart-link{
position:relative;
}

.cart-badge{
position:absolute;
top:-8px;
right:-14px;
background:black;
color:white;
font-size:12px;
padding:3px 7px;
border-radius:50%;
}

/* PAGE */

.container{
padding:50px 80px;
}

.title{
font-size:32px;
margin-bottom:40px;
}

/* FOOD GRID */

.food-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:30px;
}

.food-card{
background:white;
border-radius:15px;
overflow:hidden;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
transition:0.3s;
}

.food-card:hover{
transform:translateY(-8px);
}

.food-card img{
width:100%;
height:260px;
object-fit:cover;
}

.food-content{
padding:15px;
}

.food-content h3{
font-size:18px;
}

.calories{
font-size:16px;
color:#7c7c7c;
margin-top:4px;
}

.price{
margin:8px 0;
font-weight:600;
}

.add-btn{
background:#2e7d32;
border:none;
padding:10px;
width:100%;
border-radius:8px;
color:white;
font-weight:600;
cursor:pointer;
}

.add-btn:hover{
background:#1b5e20;
}

/* RESPONSIVE */

@media(max-width:1000px){
.food-grid{
grid-template-columns:repeat(2,1fr);
}
}

@media(max-width:768px){

.navbar{
flex-direction:column;
padding:20px;
gap:15px;
}

.container{
padding:20px;
}

.food-grid{
grid-template-columns:1fr;
}

}

</style>
</head>

<script>

/* USER CHECK */

let user = localStorage.getItem("yummieUser");

if(user){
document.getElementById("navUser").innerText = "👋 " + user;
}else{
window.location.href="login.html";
}

/* UPDATE CART BADGE */

function updateCartCount(){

let cart = JSON.parse(localStorage.getItem("cart")) || [];

let count = cart.reduce((total,item)=> total + item.quantity,0);

let badge = document.getElementById("cartCount");

badge.innerText = count;

badge.style.display = count > 0 ? "inline-block" : "none";

}

document.addEventListener("DOMContentLoaded", updateCartCount);

/* ADD TO CART */

function addToCart(name,price,image,calories){

let cart = JSON.parse(localStorage.getItem("cart")) || [];

let existing = cart.find(item => item.name === name);

if(existing){
existing.quantity += 1;
}else{

cart.push({
name:name,
price:price,
image:image,
calories:calories,
quantity:1
});

}

localStorage.setItem("cart", JSON.stringify(cart));

updateCartCount();

alert(name + " added to cart!");

}

</script>
