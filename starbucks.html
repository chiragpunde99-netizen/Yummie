<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Starbucks - Yummie</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<style>

*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}

body{background:#f3faf3;}

.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 80px;
background:#2e7d32;
color:white;
}

.logo{font-size:28px;font-weight:800;}

.nav-links{display:flex;gap:25px;align-items:center;}

.nav-links a{color:white;text-decoration:none;font-weight:500;}

.cart-link{position:relative;}

.cart-badge{
position:absolute;
top:-8px;
right:-14px;
background:black;
color:white;
font-size:12px;
padding:3px 7px;
border-radius:50%;
}

.container{padding:50px 80px;}

.title{font-size:32px;margin-bottom:40px;}

.food-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:30px;
}

.food-card{
background:white;
border-radius:15px;
overflow:hidden;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
transition:0.3s;
}

.food-card:hover{transform:translateY(-8px);}

.food-card img{width:100%;height:260px;object-fit:cover;}

.food-content{padding:15px;}

.calories{color:#777;margin-top:5px;}

.price{font-weight:600;margin:8px 0;}

.add-btn{
background:#2e7d32;
border:none;
padding:10px;
width:100%;
border-radius:8px;
color:white;
cursor:pointer;
}

.add-btn:hover{background:#1b5e20;}

</style>
</head>

<body>

<div class="navbar">
<div class="logo">Yummie</div>

<div class="nav-links">
<a href="restaurants.html">Restaurants</a>

<a href="cart.html" class="cart-link">
Cart 🛒
<span id="cartCount" class="cart-badge">0</span>
</a>

<span id="navUser"></span>
</div>
</div>

<div class="container">

<div class="title">Starbucks Healthy Menu ☕</div>

<div class="food-grid">

<div class="food-card">
<img src="https://images.unsplash.com/photo-1509042239860-f550ce710b93">
<div class="food-content">
<h3>Iced Latte</h3>
<div class="calories">🔥 220 kcal</div>
<div class="price">₹180</div>
<button class="add-btn" onclick="addToCart('Iced Latte',180,'https://images.unsplash.com/photo-1509042239860-f550ce710b93',120)">Add</button>
</div>
</div>

<div class="food-card">
<img src="https://images.unsplash.com/photo-1504754524776-8f4f37790ca0">
<div class="food-content">
<h3>Oatmeal Bowl</h3>
<div class="calories">🔥 340 kcal</div>
<div class="price">₹200</div>
<button class="add-btn" onclick="addToCart('Oatmeal Bowl',200,'https://images.unsplash.com/photo-1504754524776-8f4f37790ca0',220)">Add</button>
</div>
</div>

<div class="food-card">
<img src="https://images.unsplash.com/photo-1551024601-bec78aea704b">
<div class="food-content">
<h3>Berry Smoothie</h3>
<div class="calories">🔥 370 kcal</div>
<div class="price">₹210</div>
<button class="add-btn" onclick="addToCart('Berry Smoothie',210,'https://images.unsplash.com/photo-1551024601-bec78aea704b',200)">Add</button>
</div>
</div>

<div class="food-card">
<img src="https://media-assets.swiggy.com/swiggy/image/upload/fl_lossy,f_auto,q_auto,h_600/FOOD_CATALOG/IMAGES/CMS/2026/1/13/3c1f1530-8c1c-40cb-bf40-3ed0d087209d_99476651-7d41-4862-bb05-0adf103841ff.jpg">
<div class="food-content">
<h3>Chicken Ragi Flat Bread</h3>
<div class="calories">🔥 350 kcal</div>
<div class="price">₹295</div>
<button class="add-btn" onclick="addToCart('Chicken Ragi Flat Bread',295,'https://media-assets.swiggy.com/swiggy/image/upload/fl_lossy,f_auto,q_auto,h_600/FOOD_CATALOG/IMAGES/CMS/2026/1/13/3c1f1530-8c1c-40cb-bf40-3ed0d087209d_99476651-7d41-4862-bb05-0adf103841ff.jpg',350)">Add</button>
</div>
</div>

<div class="food-card">
<img src="https://media-assets.swiggy.com/swiggy/image/upload/fl_lossy,f_auto,q_auto,h_600/FOOD_CATALOG/IMAGES/CMS/2026/2/10/9a55aa13-b985-4c5b-ae58-47c5d606b4f1_bde100d4-29b4-4688-955c-0c5c8783a9fb.jpg">
<div class="food-content">
<h3>Iced Matcha with Banana Foam</h3>
<div class="calories">🔥 410 kcal</div>
<div class="price">₹395</div>
<button class="add-btn" onclick="addToCart('Fruit Bowl',150,'https://images.unsplash.com/photo-1498837167922-ddd27525d352',210)">Add</button>
</div>
</div>

<div class="food-card">
<img src="https://images.unsplash.com/photo-1464305795204-6f5bbfc7fb81">
<div class="food-content">
<h3>Avocado Sandwich</h3>
<div class="calories">🔥 300 kcal</div>
<div class="price">₹230</div>
<button class="add-btn" onclick="addToCart('Avocado Sandwich',230,'https://images.unsplash.com/photo-1464305795204-6f5bbfc7fb81',300)">Add</button>
</div>
</div>

</div>
</div>

<script>

let user = localStorage.getItem("yummieUser");

if(user){
document.getElementById("navUser").innerText="👋 "+user;
}

function updateCartCount(){
let cart = JSON.parse(localStorage.getItem("cart")) || [];
let count = cart.reduce((t,i)=>t+i.quantity,0);
document.getElementById("cartCount").innerText=count;
}

function addToCart(name,price,image,calories){

let cart = JSON.parse(localStorage.getItem("cart")) || [];

let existing = cart.find(i=>i.name===name);

if(existing){
existing.quantity+=1;
}else{
cart.push({name,price,image,calories,quantity:1});
}

localStorage.setItem("cart",JSON.stringify(cart));
updateCartCount();

alert(name+" added to cart!");

}

updateCartCount();

</script>

</body>
</html>
