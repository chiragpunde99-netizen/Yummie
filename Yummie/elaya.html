<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elaya - Yummie</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#f3faf3;
}

/* NAVBAR */

.navbar{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 80px;
background:#2e7d32;
color:white;
}

.logo{
font-size:28px;
font-weight:800;
}

.nav-links{
display:flex;
gap:25px;
align-items:center;
}

.nav-links a{
color:white;
text-decoration:none;
font-weight:500;
}

.cart-link{
position:relative;
}

.cart-badge{
position:absolute;
top:-8px;
right:-14px;
background:black;
color:white;
font-size:12px;
padding:3px 7px;
border-radius:50%;
}

/* PAGE */

.container{
padding:50px 80px;
}

.title{
font-size:32px;
margin-bottom:40px;
}

/* FOOD GRID */

.food-grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:30px;
}

.food-card{
background:white;
border-radius:15px;
overflow:hidden;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
transition:0.3s;
}

.food-card:hover{
transform:translateY(-8px);
}

.food-card img{
width:100%;
height:260px;
object-fit:cover;
}

.food-content{
padding:15px;
}

.food-content h3{
font-size:18px;
}

.calories{
font-size:16px;
color:#7c7c7c;
margin-top:4px;
}

.price{
margin:8px 0;
font-weight:600;
}

.add-btn{
background:#2e7d32;
border:none;
padding:10px;
width:100%;
border-radius:8px;
color:white;
font-weight:600;
cursor:pointer;
}

.add-btn:hover{
background:#1b5e20;
}

/* RESPONSIVE */

@media(max-width:1000px){
.food-grid{
grid-template-columns:repeat(2,1fr);
}
}

@media(max-width:768px){

.navbar{
flex-direction:column;
padding:20px;
gap:15px;
}

.container{
padding:20px;
}

.food-grid{
grid-template-columns:1fr;
}

}

</style>
</head>

<body>

<!-- NAVBAR -->

<div class="navbar">

<div class="logo">Yummie</div>

<div class="nav-links">

<a href="restaurants.html">Restaurants</a>

<a href="cart.html" class="cart-link">
Cart 🛒
<span id="cartCount" class="cart-badge">0</span>
</a>

<span id="navUser"></span>

</div>

</div>

<!-- PAGE -->

<div class="container">

<div class="title">Elaya Healthy Kitchen 🥗</div>

<div class="food-grid">

<!-- 1 -->

<div class="food-card">
<img src="https://www.google.com/url?sa=t&source=web&rct=j&url=https%3A%2F%2Felavegan.com%2Frice-salad-recipe%2F&ved=0CBYQjRxqFwoTCNCLlevtmpMDFQAAAAAdAAAAABAI&opi=89978449">
<div class="food-content">
<h3>Ela Veg Salads</h3>
<div class="calories">🔥 420 kcal</div>
<div class="price">₹289</div>
<button class="add-btn" onclick="addToCart('Ela Veg Salads',289,'https://media-assets.swiggy.com/swiggy/image/upload/fl_lossy,f_auto,q_auto,w_300,h_300,e_grayscale,c_fit/FOOD_CATALOG/IMAGES/CMS/2024/7/31/f7ee9e8b-9c1b-4cd2-a789-b3deab32cae5_c1ec9144-4a66-48f3-96e4-c60ccd3f68f0.jpg',420)">Add to Cart</button>
</div>
</div>

<!-- 2 -->

<div class="food-card">
<img src="https://images.unsplash.com/photo-1505253716362-afaea1d3d1af">
<div class="food-content">
<h3>Ela Chicken Salad</h3>
<div class="calories">🔥 480 kcal</div>
<div class="price">₹329</div>
<button class="add-btn" onclick="addToCart('Ela Chicken Salad',329,'https://images.unsplash.com/photo-1505253716362-afaea1d3d1af',280)">Add to Cart</button>
</div>
</div>

<!-- 3 -->

<div class="food-card">
<img src="https://images.unsplash.com/photo-1546069901-ba9599a7e63c">
<div class="food-content">
<h3>Oatmeal</h3>
<div class="calories">🔥 320 kcal</div>
<div class="price">₹189</div>
<button class="add-btn" onclick="addToCart('Quinoa Bowl',230,'https://images.unsplash.com/photo-1546069901-ba9599a7e63c',320)">Add to Cart</button>
</div>
</div>

<!-- 4 -->

<div class="food-card">
<img src="https://images.unsplash.com/photo-1498837167922-ddd27525d352">
<div class="food-content">
<h3>Fruit Bowl</h3>
<div class="calories">🔥 200 kcal</div>
<div class="price">₹140</div>
<button class="add-btn" onclick="addToCart('Fruit Bowl',140,'https://images.unsplash.com/photo-1498837167922-ddd27525d352',200)">Add to Cart</button>
</div>
</div>

<!-- 5 -->

<div class="food-card">
<img src="https://images.unsplash.com/photo-1556910103-1c02745aae4d">
<div class="food-content">
<h3>Multigrain Oatmeal</h3>

<button class="add-btn" onclick="addToCart('Multigrain Oatmeal',199,'https://images.unsplash.com/photo-1556910103-1c02745aae4d',300)">Add to Cart</button>
</div>
</div>

<!-- 6 -->

<div class="food-card">

<div class="food-content">

<div class="price">₹240</div>
<button class="add-btn" onclick="addToCart('Smoothie Bowl',240,'https://images.unsplash.com/photo-1490645935967-10de6ba17061',340)">Add to Cart</button>
</div>
</div>

</div>

</div>

<script>

/* USER CHECK */

let user = localStorage.getItem("yummieUser");

if(user){
document.getElementById("navUser").innerText = "👋 " + user;
}else{
window.location.href="login.html";
}

/* UPDATE CART BADGE */

function updateCartCount(){

let cart = JSON.parse(localStorage.getItem("cart")) || [];

let count = cart.reduce((total,item)=> total + item.quantity,0);

let badge = document.getElementById("cartCount");

badge.innerText = count;

badge.style.display = count > 0 ? "inline-block" : "none";

}

document.addEventListener("DOMContentLoaded", updateCartCount);

/* ADD TO CART */

function addToCart(name,price,image,calories){

let cart = JSON.parse(localStorage.getItem("cart")) || [];

let existing = cart.find(item => item.name === name);

if(existing){
existing.quantity += 1;
}else{

cart.push({
name:name,
price:price,
image:image,
calories:calories,
quantity:1
});

}

localStorage.setItem("cart", JSON.stringify(cart));

updateCartCount();

alert(name + " added to cart!");

}

</script>

</body>
</html>
